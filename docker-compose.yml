version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hemsolutions-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/hemsolutions?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - db
      - redis
    networks:
      - hemsolutions-network
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: hemsolutions-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=hemsolutions
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hemsolutions-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hemsolutions-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - hemsolutions-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  hemsolutions-network:
    driver: bridge
