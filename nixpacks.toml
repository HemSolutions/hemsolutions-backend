# Nixpacks configuration for Railway deployment
# Alternative to Dockerfile - Railway can use either

[phases.setup]
nixPkgs = ['nodejs_20', 'npm-9_x']

[phases.build]
cmds = [
    'npm ci',
    'npx prisma generate',
    'npm run build'
]

[phases.deploy]
cmds = ['npm run db:deploy']

[start]
cmd = 'npm start'

[variables]
NODE_ENV = 'production'
PORT = '3001'
