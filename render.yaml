services:
  - type: web
    name: hemsolutions-api
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build && npm run db:generate
    startCommand: npm run db:deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3001'
      - key: DATABASE_URL
        fromDatabase:
          name: hemsolutions-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: hemsolutions-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: hemsolutions-db
    databaseName: hemsolutions
    user: hemsolutions
    plan: starter

services:
  - type: redis
    name: hemsolutions-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
